<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5C2E00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>松赞餐饮评估 · 后台管理</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--primary:#8B4513;--primary-light:#A0522D;--primary-dark:#5C2E00;--gold:#C9A84C;--gold-light:#E8D5A3;--gold-lighter:#FAF6EE;--bg:#F5F0E8;--text:#2C1A0E;--text-muted:#7A5C44;--border:#E0CBA0;--white:#FFFFFF;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.top-bar{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:white;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(92,46,0,.25);position:sticky;top:0;z-index:100;}
.top-bar-title{font-size:17px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:10px;}
.admin-badge{background:var(--gold);color:var(--primary-dark);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;}
.top-bar-right{display:flex;gap:10px;}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;font-weight:600;transition:all .15s;}
.btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.5);color:white;}
.btn-outline:hover{background:rgba(255,255,255,.15);}
.btn-gold{background:var(--gold);color:var(--primary-dark);}
.page{max-width:1200px;margin:0 auto;padding:28px 24px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:white;border-radius:12px;padding:20px;border:1.5px solid var(--border);box-shadow:0 1px 8px rgba(139,69,19,.07);}
.stat-val{font-size:32px;font-weight:900;color:var(--primary);line-height:1;}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:6px;}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:4px;}
.section-title{font-size:15px;font-weight:700;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:4px;height:18px;background:var(--gold);border-radius:2px;display:block;}
.card{background:white;border-radius:12px;padding:20px 24px;border:1.5px solid var(--border);box-shadow:0 1px 8px rgba(139,69,19,.07);margin-bottom:20px;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.chart-card{background:white;border-radius:12px;padding:20px 24px;border:1.5px solid var(--border);box-shadow:0 1px 8px rgba(139,69,19,.07);}
.chart-card h3{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:14px;}
.filters{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.filters select,.filters input{padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;outline:none;background:white;color:var(--text);}
.filters select:focus,.filters input:focus{border-color:var(--gold);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:10px 14px;background:var(--gold-lighter);color:var(--primary-dark);font-weight:700;text-align:left;border-bottom:2px solid var(--border);}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:var(--gold-lighter);}
.score-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;}
.sc-ex{background:#C8E6C9;color:#1B5E20;}
.sc-gd{background:#DCEDC8;color:#33691E;}
.sc-ok{background:#FFF9C4;color:#827717;}
.sc-ni{background:#FFE0B2;color:#E65100;}
.sc-ba{background:#FFCDD2;color:#B71C1C;}
.action-btns{display:flex;gap:6px;}
.btn-xs{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:none;font-weight:600;}
.btn-view{background:#E3F2FD;color:#1565C0;}
.btn-del{background:#FFEBEE;color:#B71C1C;}
.tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;margin-right:4px;}
.tag-role{background:#E8EAF6;color:#3949AB;}
.tag-meal{background:#E8F5E9;color:#2E7D32;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:16px;}
.detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center;}
.detail-modal.open{display:flex;}
.detail-box{background:white;border-radius:16px;width:700px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.detail-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:white;padding:20px 24px;border-radius:16px 16px 0 0;position:relative;}
.detail-header h2{font-size:17px;font-weight:700;}
.detail-header p{font-size:12px;opacity:.75;margin-top:4px;}
.detail-close{position:absolute;top:14px;right:18px;background:rgba(255,255,255,.2);border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.detail-body{padding:20px 24px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--primary-dark);color:white;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
@media(max-width:800px){.stats-grid{grid-template-columns:1fr 1fr;}.charts-row{grid-template-columns:1fr;}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr 1fr;}table{font-size:12px;}}

/* ===== iOS 显示比例适配 ===== */
body { padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
.top-bar { padding-top: calc(12px + env(safe-area-inset-top)); height: calc(60px + env(safe-area-inset-top)); }
.filters select, .filters input { font-size: 16px; min-height: 44px; }
input[type="date"], select { -webkit-appearance: none; }
/* 禁止 iOS 长按弹出菜单（输入框除外） */
* { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
input, textarea, select { -webkit-touch-callout: default; -webkit-user-select: text; user-select: text; }

/* ===== 登录遮罩层 ===== */
.login-overlay{
  position:fixed;inset:0;
  background:linear-gradient(170deg, #FDF6EC 0%, #FAF0E6 40%, #F5ECDF 100%);
  z-index:99999;display:flex;align-items:center;justify-content:center;
  padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));
}
.login-overlay.hidden{display:none;}
.login-box{
  background:white;border-radius:20px;width:340px;max-width:90vw;
  padding:36px 28px 28px;text-align:center;
  box-shadow:0 12px 48px rgba(92,46,0,.18);
  border:1.5px solid var(--border);
}
.login-logo{
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:30px;
  color:white;box-shadow:0 4px 16px rgba(139,69,19,.25);
}
.login-box h2{font-size:20px;font-weight:800;color:var(--primary-dark);margin-bottom:4px;}
.login-box p{font-size:13px;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.login-input{
  width:100%;padding:13px 16px;border:1.5px solid var(--border);
  border-radius:10px;font-size:16px;outline:none;margin-bottom:16px;
  text-align:center;letter-spacing:2px;font-weight:700;color:var(--primary-dark);
  -webkit-text-security:disc;transition:border-color .2s,box-shadow .2s;
  background:var(--gold-lighter);
}
.login-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.18);background:white;}
.login-btn{
  width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:1px;transition:opacity .2s;
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  color:white;box-shadow:0 4px 12px rgba(139,69,19,.2);
}
.login-btn:hover{opacity:.88;}
.login-btn:active{opacity:.75;transform:scale(.97);}
.login-err{color:#B71C1C;font-size:12px;font-weight:600;margin-top:10px;min-height:18px;display:none;}
.login-footer{margin-top:18px;font-size:11px;color:rgba(139,69,19,.35);letter-spacing:.5px;}
</style>
</head>
<body>

<!-- 登录遮罩层 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">&#9968;</div>
    <h2>管理员登录</h2>
    <p>松赞餐饮评估系统 · 后台管理</p>
    <input type="password" id="loginPwd" class="login-input" placeholder="请输入管理密码" autocomplete="off">
    <button class="login-btn" onclick="adminLogin.doLogin()">验证进入</button>
    <div class="login-err" id="loginErr">密码错误，请重试</div>
    <div class="login-footer">Songzan Dining Assessment Admin</div>
  </div>
</div>

<div class="top-bar">
  <div class="top-bar-title">
    &#9968; 松赞餐饮评估
    <span class="admin-badge">后台管理</span>
  </div>
  <div class="top-bar-right">
    <button class="btn btn-outline" onclick="admin.exportAll()">&#11015; 导出全部CSV</button>
    <button class="btn btn-outline" onclick="admin.clearAllData()">&#128465; 清空所有数据</button>
    <button class="btn btn-outline" onclick="window.open('songzan-rating.html','_blank')">&#9998; 前往评估</button>
    <button class="btn btn-gold" onclick="admin.refresh()">&#8635; 刷新</button>
    <button class="btn btn-outline" onclick="admin.logout()">&#128274; 退出</button>
  </div>
</div>

<div class="page">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-label">&#128203; 评估记录总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-avg">&mdash;</div>
      <div class="stat-label">&#11088; 平均综合得分</div>
      <div class="stat-sub">满分 100 分</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-hotels">0</div>
      <div class="stat-label">&#127968; 覆盖酒店数</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-excellent">&mdash;</div>
      <div class="stat-label">&#127775; 优秀率（&ge;80分）</div>
      <div class="stat-sub" id="stat-excellent-sub"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>&#128202; 各分店平均得分对比</h3>
      <canvas id="chartHotel" height="220"></canvas>
    </div>
    <div class="chart-card">
      <h3>&#127912; 七大维度平均得分（雷达图）</h3>
      <canvas id="chartDims" height="220"></canvas>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>&#128200; 得分分布（区间记录数）</h3>
      <canvas id="chartDist" height="180"></canvas>
    </div>
    <div class="chart-card">
      <h3>&#128337; 近期评估趋势（最近20条）</h3>
      <canvas id="chartTrend" height="180"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="section-title">评估记录列表</div>
    <div class="filters">
      <select id="filter-hotel" onchange="admin.applyFilter()"><option value="">所有酒店</option></select>
      <select id="filter-role" onchange="admin.applyFilter()">
        <option value="">所有角色</option>
        <option>店长</option><option>餐饮管理人员</option>
        <option>神秘访客</option><option>集团质检</option>
      </select>
      <select id="filter-meal" onchange="admin.applyFilter()">
        <option value="">所有餐次</option>
        <option>早餐</option><option>午餐</option><option>晚餐</option>
        <option>下午茶</option><option>户外野餐</option><option>全天综合</option>
      </select>
      <input type="date" id="filter-date-from" onchange="admin.applyFilter()" style="width:140px;">
      <input type="date" id="filter-date-to" onchange="admin.applyFilter()" style="width:140px;">
      <button class="btn" style="background:white;color:var(--primary);border:1.5px solid var(--border);" onclick="admin.clearFilter()">清除筛选</button>
    </div>
    <div id="tableWrap"></div>
  </div>

</div>

<div class="detail-modal" id="detailModal" onclick="if(event.target===this)admin.closeDetail()">
  <div class="detail-box">
    <div class="detail-header">
      <h2 id="detailTitle">评估详情</h2>
      <p id="detailSubtitle"></p>
      <button class="detail-close" onclick="admin.closeDetail()">&#10005;</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 登录权限控制 =====
const adminLogin = (function(){
  const VALID_TOKEN = 'sz_admin_2026_valid';
  const LS_KEY = 'songzan_admin_token';
  const API_BASE = 'https://1430983566-fxry9x65pb.ap-guangzhou.tencentscf.com';

  function check() {
    var token = localStorage.getItem(LS_KEY);
    if (token === VALID_TOKEN) {
      document.getElementById('loginOverlay').classList.add('hidden');
      return true;
    }
    document.getElementById('loginOverlay').classList.remove('hidden');
    return false;
  }

  async function doLogin() {
    var pwd = document.getElementById('loginPwd');
    var errEl = document.getElementById('loginErr');
    if (!pwd.value.trim()) {
      errEl.textContent = '请输入密码'; errEl.style.display='block';
      return;
    }
    try {
      var res = await fetch(API_BASE + '?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd.value })
      });
      var data = await res.json();
      if (data.success && data.token === VALID_TOKEN) {
        localStorage.setItem(LS_KEY, VALID_TOKEN);
        errEl.style.display='none';
        document.getElementById('loginOverlay').classList.add('hidden');
      } else {
        errEl.textContent = data.error || '密码错误，请重试';
        errEl.style.display='block';
        pwd.value=''; pwd.focus();
      }
    } catch(e) {
      // 离线降级：前端本地校验
      if (pwd.value === 'songzan2026') {
        localStorage.setItem(LS_KEY, VALID_TOKEN);
        errEl.style.display='none';
        document.getElementById('loginOverlay').classList.add('hidden');
      } else {
        errEl.textContent = '网络异常或密码错误';
        errEl.style.display='block';
      }
    }
  }

  function logout() {
    localStorage.removeItem(LS_KEY);
    check();
  }

  return { check: check, doLogin: doLogin, logout: logout };
})();

// DOM 就绪后初始化登录
document.addEventListener('DOMContentLoaded', function(){
  var pwdInput = document.getElementById('loginPwd');
  if (pwdInput) {
    pwdInput.addEventListener('keydown', function(e){
      if (e.key === 'Enter') adminLogin.doLogin();
    });
    pwdInput.focus();
  }
  // 启动时检查登录状态
  adminLogin.check();
});

const admin = (function(){

  const DIM_NAMES = [
    {id:'dim1',name:'景观好',weight:0.20,icon:'\u26F0'},
    {id:'dim2',name:'服务有特质',weight:0.20,icon:'\uD83E\uDD1D'},
    {id:'dim3',name:'菜品稳定',weight:0.16,icon:'\uD83C\uDF7D'},
    {id:'dim4',name:'主题有特色',weight:0.14,icon:'\uD83C\uDFA8'},
    {id:'dim5',name:'物超所值',weight:0.12,icon:'\uD83D\uDC8E'},
    {id:'dim6',name:'食材好',weight:0.10,icon:'\uD83C\uDF3F'},
    {id:'dim7',name:'健康',weight:0.08,icon:'\uD83D\uDC9A'}
  ];

  var records = [];
  var filtered = [];
  var charts = {};

  // --- 云端 API 配置（SCF 云函数触发器 URL）---
  const API_BASE_URL = 'https://1430983566-fxry9x65pb.ap-guangzhou.tencentscf.com';

  async function loadRecords() {
    var all = [];
    var seenIds = {};

    // 1. 始终从 localStorage 加载（降级保障）
    try {
      var localData = JSON.parse(localStorage.getItem('songzan_ratings') || '[]');
      localData.forEach(function(r) {
        if (r && r.id && !seenIds[r.id]) {
          seenIds[r.id] = true;
          all.push(r);
        }
      });
    } catch(e) { console.error('localStorage load failed:', e); }

    // 2. 从 Vercel API 加载（如果已配置）
    var scfReady = API_BASE_URL && API_BASE_URL.length > 0 && API_BASE_URL.indexOf('PASTE_YOUR') === -1;
    if (scfReady) {
      try {
        var res = await fetch(API_BASE_URL + '?action=list');
        var result = await res.json();
        if (result.success) {
          (result.data || []).forEach(function(r) {
            if (r && r.id && !seenIds[r.id]) {
              seenIds[r.id] = true;
              all.push(r);
            }
          });
        }
      } catch(e) {
        console.error('SCF load failed:', e);
      }
    }

    // 按日期排序（新→旧）
    all.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    return all;
  }

  async function refresh() {
    showToast('正在加载数据...');
    records = await loadRecords();
    filtered = records.slice();
    populateHotelFilter();
    renderStats();
    renderCharts();
    renderTable();
    showToast('已刷新，共 ' + records.length + ' 条记录');
  }

  function populateHotelFilter() {
    var sel = document.getElementById('filter-hotel');
    if (!sel) return;
    var hotels = [];
    records.forEach(function(r){ if(r.hotel && hotels.indexOf(r.hotel)<0) hotels.push(r.hotel); });
    hotels.sort();
    sel.innerHTML = '<option value="">所有酒店</option>';
    hotels.forEach(function(h){
      var o = document.createElement('option');
      o.value = h; o.textContent = h;
      sel.appendChild(o);
    });
  }

  function applyFilter() {
    var hotel = document.getElementById('filter-hotel').value;
    var role = document.getElementById('filter-role').value;
    var meal = document.getElementById('filter-meal').value;
    var df = document.getElementById('filter-date-from').value;
    var dt = document.getElementById('filter-date-to').value;
    filtered = records.filter(function(r){
      if(hotel && r.hotel !== hotel) return false;
      if(role && r.role !== role) return false;
      if(meal && r.meal !== meal) return false;
      if(df && r.date < df) return false;
      if(dt && r.date > dt) return false;
      return true;
    });
    renderStats();
    renderCharts();
    renderTable();
  }

  function clearFilter() {
    ['filter-hotel','filter-role','filter-meal','filter-date-from','filter-date-to'].forEach(function(id){
      var el = document.getElementById(id);
      if(el) el.value='';
    });
    filtered = records.slice();
    renderStats();
    renderCharts();
    renderTable();
  }

  function renderStats() {
    var total = filtered.length;
    document.getElementById('stat-total').textContent = total;
    if(total===0){
      document.getElementById('stat-avg').textContent = '\u2014';
      document.getElementById('stat-hotels').textContent = 0;
      document.getElementById('stat-excellent').textContent = '\u2014';
      document.getElementById('stat-excellent-sub').textContent = '';
      return;
    }
    var scores = filtered.map(function(r){ return parseFloat(r.totalScore)||0; });
    var avg = scores.reduce(function(a,b){return a+b;},0)/scores.length;
    document.getElementById('stat-avg').textContent = avg.toFixed(1);
    var hotels = {};
    filtered.forEach(function(r){ hotels[r.hotel]=1; });
    document.getElementById('stat-hotels').textContent = Object.keys(hotels).length;
    var exc = filtered.filter(function(r){ return parseFloat(r.totalScore)>=80; }).length;
    document.getElementById('stat-excellent').textContent = Math.round(exc/total*100)+'%';
    document.getElementById('stat-excellent-sub').textContent = exc+' / '+total+' 条记录';
  }

  function renderCharts() {
    Object.keys(charts).forEach(function(k){ if(charts[k]) charts[k].destroy(); });
    charts = {};
    if(filtered.length===0) return;

    // 1. 各酒店平均分柱图
    var hmap = {};
    filtered.forEach(function(r){
      if(!hmap[r.hotel]) hmap[r.hotel]=[];
      hmap[r.hotel].push(parseFloat(r.totalScore)||0);
    });
    var hlabels = Object.keys(hmap).slice(0,12);
    var hdata = hlabels.map(function(h){
      var a=hmap[h];
      return (a.reduce(function(x,y){return x+y;},0)/a.length).toFixed(1);
    });
    var c1 = document.getElementById('chartHotel');
    if(c1) charts.hotel = new Chart(c1,{
      type:'bar',
      data:{
        labels:hlabels.map(function(h){return h.replace('松赞·','').replace('松赞','')}),
        datasets:[{label:'平均得分',data:hdata,backgroundColor:'rgba(201,168,76,0.75)',borderColor:'#8B4513',borderWidth:1.5,borderRadius:6}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{font:{size:11}}},x:{ticks:{font:{size:10}}}}}
    });

    // 2. 七维度雷达
    var dimAvgs = DIM_NAMES.map(function(d){
      var vals=filtered.filter(function(r){return r.dimScores;}).map(function(r){
        var ds=r.dimScores.find(function(x){return x.id===d.id;});
        return ds?parseFloat(ds.score)*20:0;
      }).filter(function(v){return v>0;});
      return vals.length>0?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):0;
    });
    var c2 = document.getElementById('chartDims');
    if(c2) charts.dims = new Chart(c2,{
      type:'radar',
      data:{
        labels:DIM_NAMES.map(function(d){return d.name;}),
        datasets:[{label:'平均(满分100)',data:dimAvgs,backgroundColor:'rgba(201,168,76,0.2)',borderColor:'#8B4513',borderWidth:2,pointBackgroundColor:'#C9A84C',pointRadius:4}]
      },
      options:{responsive:true,scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:10}},pointLabels:{font:{size:10}}}},plugins:{legend:{display:false}}}
    });

    // 3. 分数分布
    var dist=[0,0,0,0,0];
    filtered.forEach(function(r){
      var s=parseFloat(r.totalScore)||0;
      if(s>=90)dist[4]++;
      else if(s>=80)dist[3]++;
      else if(s>=70)dist[2]++;
      else if(s>=60)dist[1]++;
      else dist[0]++;
    });
    var c3=document.getElementById('chartDist');
    if(c3) charts.dist=new Chart(c3,{
      type:'doughnut',
      data:{
        labels:['<60','60-70','70-80','80-90','\u226590'],
        datasets:[{data:dist,backgroundColor:['#FFCDD2','#FFE0B2','#FFF9C4','#DCEDC8','#C8E6C9'],borderColor:['#EF9A9A','#FFCC80','#FFF176','#C5E1A5','#A5D6A7'],borderWidth:1.5}]
      },
      options:{responsive:true,plugins:{legend:{position:'right',labels:{font:{size:11}}}}}
    });

    // 4. 趋势折线图
    var recent=filtered.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');}).slice(-20);
    var c4=document.getElementById('chartTrend');
    if(c4) charts.trend=new Chart(c4,{
      type:'line',
      data:{
        labels:recent.map(function(r){return (r.date||'').slice(5)+' '+(r.hotel||'').slice(2,6);}),
        datasets:[{label:'\u603b\u5206',data:recent.map(function(r){return parseFloat(r.totalScore)||0;}),borderColor:'#8B4513',backgroundColor:'rgba(201,168,76,0.15)',tension:0.3,pointBackgroundColor:'#C9A84C',pointRadius:4,fill:true}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{font:{size:10}}},x:{ticks:{font:{size:9},maxRotation:45}}}}
    });
  }

  function levelClass(score) {
    var s=parseFloat(score)||0;
    if(s>=90)return 'sc-ex';
    if(s>=80)return 'sc-gd';
    if(s>=70)return 'sc-ok';
    if(s>=60)return 'sc-ni';
    return 'sc-ba';
  }

  function levelText(score) {
    var s=parseFloat(score)||0;
    if(s>=90)return '\u6781\u81f4';
    if(s>=80)return '\u4f18\u79c0';
    if(s>=70)return '\u826f\u597d';
    if(s>=60)return '\u5f85\u6539\u8fdb';
    return '\u4e0d\u8fbe\u6807';
  }

  function renderTable() {
    var wrap = document.getElementById('tableWrap');
    if(!wrap) return;
    if(filtered.length===0){
      wrap.innerHTML='<div class="empty-state"><div class="empty-icon">\uD83D\uDCCB</div><p>\u6682\u65e0\u8bc4\u4f30\u8bb0\u5f55<br>\u8bf7\u5148\u5728\u8bc4\u4f30\u9875\u5b8c\u6210\u8bc4\u4f30\u5e76\u4fdd\u5b58\u8bb0\u5f55</p><button class="btn btn-gold" style="margin:0 auto;display:block;" onclick="window.open(\'songzan-rating.html\',\'_blank\')">\u524d\u5f80\u8bc4\u4f30</button></div>';
      return;
    }
    var html='<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>\u9152\u5e97/\u9910\u5385</th><th>\u65e5\u671f</th><th>\u9910\u6b21</th><th>\u8bc4\u4f30\u4eba</th><th>\u89d2\u8272</th><th>\u603b\u5206</th><th>\u7b49\u7ea7</th><th>\u64cd\u4f5c</th></tr></thead><tbody>';
    filtered.forEach(function(r,i){
      var cls=levelClass(r.totalScore);
      var lvl=levelText(r.totalScore);
      html+='<tr>'+
        '<td style="color:var(--text-muted);">'+(i+1)+'</td>'+
        '<td><strong>'+(r.hotel||'\u2014')+'</strong></td>'+
        '<td>'+(r.date||'\u2014')+'</td>'+
        '<td><span class="tag tag-meal">'+(r.meal||'\u2014')+'</span></td>'+
        '<td>'+(r.evaluator||'\u2014')+'</td>'+
        '<td><span class="tag tag-role">'+(r.role||'\u2014')+'</span></td>'+
        '<td><strong style="font-size:16px;color:var(--primary);">'+(r.totalScore||'\u2014')+'</strong></td>'+
        '<td><span class="score-badge '+cls+'">'+lvl+'</span></td>'+
        '<td><div class="action-btns">'+
          '<button class="btn-xs btn-view" onclick="admin.viewDetail('+r.id+')">\u8be6\u60c5</button>'+
          '<button class="btn-xs btn-del" onclick="admin.deleteRecord('+r.id+')">\u5220\u9664</button>'+
        '</div></td>'+
      '</tr>';
    });
    html+='</tbody></table></div>';
    html+='<div style="font-size:12px;color:var(--text-muted);margin-top:10px;text-align:right;">\u5171 '+filtered.length+' \u6761 / \u603b\u8ba1 '+records.length+' \u6761</div>';
    wrap.innerHTML=html;
  }

  function viewDetail(id) {
    var r=records.find(function(x){return x.id==id;});
    if(!r)return;
    document.getElementById('detailTitle').textContent=(r.hotel||'')+' \u00b7 '+(r.meal||'');
    document.getElementById('detailSubtitle').textContent=(r.date||'')+' \u00b7 \u8bc4\u4f30\u4eba\uff1a'+(r.evaluator||'')+'\uff08'+(r.role||'')+'\uff09 \u00b7 \u5929\u6c14\uff1a'+(r.weather||'\u672a\u586b')+' \u00b7 \u603b\u5206\uff1a'+(r.totalScore||'');
    var html='<div style="background:var(--gold-lighter);border-radius:8px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:20px;">'+
      '<div style="font-size:48px;font-weight:900;color:var(--primary);">'+(r.totalScore||'')+'</div>'+
      '<div><div style="font-size:16px;font-weight:700;color:var(--primary-dark);">'+(r.level||levelText(r.totalScore))+'</div>'+
      '<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">'+(r.savedAt||'')+' \u4fdd\u5b58</div>'+
      (r.note?'<div style="font-size:12px;color:var(--text-muted);margin-top:4px;">\uD83D\uDCDD\u5907\u6ce8\uff1a'+r.note+'</div>':'')+
      '</div></div>';
    if(r.dimScores&&r.dimScores.length>0){
      html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">';
      r.dimScores.forEach(function(ds){
        var dim=DIM_NAMES.find(function(d){return d.id===ds.id;});
        var s100=(parseFloat(ds.score)*20).toFixed(1);
        var pct=Math.min(100,parseFloat(s100));
        html+='<div style="border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;">'+
          '<div style="font-size:11px;color:var(--text-muted);">'+(dim?dim.icon:'')+' '+(dim?dim.name:'')+' <span style="opacity:.6;">('+(dim?(dim.weight*100).toFixed(0):0)+'%)</span></div>'+
          '<div style="font-size:20px;font-weight:800;color:var(--primary);margin-top:4px;">'+s100+'<span style="font-size:11px;color:var(--text-muted);">/100</span></div>'+
          '<div style="height:4px;background:#eee;border-radius:2px;margin-top:6px;"><div style="height:100%;border-radius:2px;background:var(--gold);width:'+pct+'%"></div></div>'+
          '</div>';
      });
      html+='</div>';
    }
    if(r.privateSpaceEnabled===false){
      html+='<div style="background:#FFEBEE;border-radius:6px;padding:8px 12px;font-size:12px;color:#B71C1C;margin-bottom:12px;">\u2139\uFE0F \u672c\u6b21\u8bc4\u4f30\u4e2d\u65e0\u79c1\u5bc6\u5305\u623f\uff0c1.2\u5b50\u7ef4\u5ea6\u5df2\u5173\u95ed\uff0c\u6743\u91cd\u5df2\u91cd\u65b0\u5206\u914d\u3002</div>';
    }
    document.getElementById('detailBody').innerHTML=html;
    document.getElementById('detailModal').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailModal').classList.remove('open');
  }

  async function deleteRecord(id) {
    if(!confirm('\u786e\u8ba4\u5220\u9664\u8fd9\u6761\u8bc4\u4f30\u8bb0\u5f55\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\u3002'))return;
    if (!API_BASE_URL || API_BASE_URL.indexOf('PASTE_YOUR') === 0) {
      showToast('\u26a0\ufe0f \u8bf7\u5148\u914d\u7f6e API_BASE_URL');
      return;
    }
    try {
      const res = await fetch(API_BASE_URL + '?action=delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete', id: id })
      });
      const result = await res.json();
      if (!result.success) {
        showToast('\u5220\u9664\u5931\u8d25\uff1a' + (result.error || '\u672a\u77e5\u9519\u8bef'));
      }
    } catch(e) {
      showToast('\u7f51\u7edc\u9519\u8bef\uff0c\u8bf7\u91cd\u8bd5');
      console.error('deleteRecord error:', e);
    }
    // \u4ece\u670d\u52a1\u7aef\u91cd\u65b0\u52a0\u8f7d\u6570\u636e
    await refresh();
  }

  function clearAllData() {
    if (!confirm('⚠️ 确认清空所有评估记录？\n\n此操作将删除 localStorage 中的全部数据，不可恢复！\n建议先导出 CSV 备份。')) return;
    if (!confirm('再次确认：真的要清空全部 ' + records.length + ' 条记录吗？')) return;
    try { localStorage.removeItem('songzan_ratings'); } catch(e) {}
    showToast('✅ 已清空所有数据');
    refresh();
  }

  function exportAll() {
    if(filtered.length===0){showToast('\u6682\u65e0\u6570\u636e\u53ef\u5bfc\u51fa');return;}
    var BOM='\uFEFF';
    var csv=BOM+'\u9152\u5e97/\u9910\u5385,\u65e5\u671f,\u9910\u6b21,\u8bc4\u4f30\u4eba,\u89d2\u8272,\u5929\u6c14,\u603b\u5206,\u7b49\u7ea7';
    DIM_NAMES.forEach(function(d){csv+=','+d.name+'\u5f97\u5206(100\u5236)';});
    csv+=',\u5907\u6ce8,\u4fdd\u5b58\u65f6\u95f4\n';
    filtered.forEach(function(r){
      var row=[r.hotel,r.date,r.meal,r.evaluator,r.role,r.weather,r.totalScore,levelText(r.totalScore)];
      DIM_NAMES.forEach(function(d){
        var ds=r.dimScores&&r.dimScores.find(function(x){return x.id===d.id;});
        row.push(ds?(parseFloat(ds.score)*20).toFixed(1):'');
      });
      row.push('"'+(r.note||'').replace(/"/g,'""')+'"');
      row.push(r.savedAt||'');
      csv+=row.join(',')+'\n';
    });
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='\u677e\u8d5e\u9910\u996e\u8bc4\u4f30\u6570\u636e_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.csv';
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV \u5df2\u5bfc\u51fa\uff0c\u5171 '+filtered.length+' \u6761');
  }

  function showToast(msg) {
    var t=document.getElementById('toast');
    if(!t)return;
    t.innerHTML=msg;
    t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2800);
  }

  document.addEventListener('DOMContentLoaded',function(){
    if (adminLogin.check()) refresh();
  });

  return {
    refresh: refresh,
    applyFilter: applyFilter,
    clearFilter: clearFilter,
    viewDetail: viewDetail,
    closeDetail: closeDetail,
    deleteRecord: deleteRecord,
    clearAllData: clearAllData,
    exportAll: exportAll,
    logout: adminLogin.logout
  };
})();
</script>
</body>
</html>
